# ================================================================
# BitMacro Relay Agent — Fragment (v0.2 — 1 agent, N relays)
# Composed WITH parent docker-compose.yml that has relay_public, relay_private, relay_paid.
#
# Usage (from parent dir, e.g. /home/server/):
#   docker compose -f docker-compose.yml -f relay-agent/docker-compose.relay-agent.yml build relay-agent
#   docker compose -f docker-compose.yml -f relay-agent/docker-compose.relay-agent.yml up -d relay-agent
#
# Requires: relay_private, relay_public, relay_paid, network bitmacro in parent compose.
# Prerequisites: nostr/{public,private,paid}/ must have strfry.conf, whitelist.txt, data/
# LMDB: mount host .../data to container .../data so strfry.conf db="./data/" matches relay_* containers.
# Env vars (add to .env): RELAY_AGENT_TOKEN (single token for all relays)
#
# Port 7810. Routes: GET /public/stats, GET /private/policy, etc.
#
# If both `image` and `build` are set, `docker compose build` tags the local image as
# `image`, overwriting what `docker compose pull` fetched. For GHCR-only deploys use
# `pull` + `up` without `build`; when rebuilding from git use `git pull` then
# `docker compose build --no-cache`.
# ================================================================

services:
  relay-agent:
    image: ghcr.io/bitmacro/relay-agent:latest
    build:
      context: ./relay-agent
      dockerfile: Dockerfile
    container_name: relay-agent
    restart: unless-stopped
    networks:
      - bitmacro
    ports:
      - "7810:7800"
    volumes:
      # strfry.conf uses db="./strfry-db/" — mount data there for strfry scan/delete
      - ./nostr/public/data:/app/nostr/public/strfry-db
      - ./nostr/public/strfry.conf:/app/nostr/public/strfry.conf
      - ./nostr/public/whitelist.txt:/app/nostr/public/whitelist.txt
      - ./nostr/private/data:/app/nostr/private/strfry-db
      - ./nostr/private/strfry.conf:/app/nostr/private/strfry.conf
      - ./nostr/private/whitelist.txt:/app/nostr/private/whitelist.txt
      - ./nostr/paid/data:/app/nostr/paid/strfry-db
      - ./nostr/paid/strfry.conf:/app/nostr/paid/strfry.conf
      - ./nostr/paid/whitelist.txt:/app/nostr/paid/whitelist.txt
    environment:
      - RELAY_INSTANCES=[{"id":"public","token":"${RELAY_AGENT_TOKEN:-change_me}","strfryConfig":"/app/nostr/public/strfry.conf","strfryDb":"/app/nostr/public/strfry-db","whitelistPath":"/app/nostr/public/whitelist.txt"},{"id":"private","token":"${RELAY_AGENT_TOKEN:-change_me}","strfryConfig":"/app/nostr/private/strfry.conf","strfryDb":"/app/nostr/private/strfry-db","whitelistPath":"/app/nostr/private/whitelist.txt"},{"id":"paid","token":"${RELAY_AGENT_TOKEN:-change_me}","strfryConfig":"/app/nostr/paid/strfry.conf","strfryDb":"/app/nostr/paid/strfry-db","whitelistPath":"/app/nostr/paid/whitelist.txt"}]
      - STRFRY_BIN=/app/strfry
      - PORT=7800
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:7800/health > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s
    depends_on:
      - relay_private
      - relay_public
      - relay_paid
