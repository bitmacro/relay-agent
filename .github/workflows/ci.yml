name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build

  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - run: npm test -- tests/unit

  test-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - name: Install strfry (optional)
        continue-on-error: true
        run: |
          STRFRY_VERSION=0.9.6
          wget -q "https://github.com/hoytech/strfry/releases/download/v${STRFRY_VERSION}/strfry-${STRFRY_VERSION}-x86_64-unknown-linux-musl.tar.gz" -O strfry.tar.gz || true
          if [ -f strfry.tar.gz ]; then
            tar -xzf strfry.tar.gz
            chmod +x strfry
            sudo mv strfry /usr/local/bin/
            strfry --version
          fi
      - run: npm test -- tests/integration
